services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PARKSIGHT_SALT=${PARKSIGHT_SALT:-parksight-local}
    command: uvicorn parksight.api.main:app --host 0.0.0.0 --port 8000

  dashboard:
    build: .
    ports:
      - "8501:8501"
    environment:
      - PARKSIGHT_SALT=${PARKSIGHT_SALT:-parksight-local}
    command: streamlit run src/parksight/dashboard/app.py --server.address 0.0.0.0 --server.port 8501
